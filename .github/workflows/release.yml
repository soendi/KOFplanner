name: "Build & Release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o pub

      - name: "Install Inno Setup"
        shell: pwsh
        run: choco install innosetup --no-progress

      - name: "Compile installer"
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: "Read version"
        shell: pwsh
        run: |
          $v = (Get-Content version.json | ConvertFrom-Json).version
          echo "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: "Create Release"
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ env.VERSION }}"
          gh release create $tag `
            "KOFplanner-Setup.exe" `
            --title $tag `
            --notes "Siehe Commits fuer Details."
