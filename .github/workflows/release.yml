name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Publish
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o pub

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Compile installer
        run: & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Read version
        shell: pwsh
        run: |
          $v = (Get-Content version.json | ConvertFrom-Json).version
          echo "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      - name: Create Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ env.VERSION }}" `
            "KOFplanner-Setup.exe" `
            --title "v${{ env.VERSION }}" `
            --notes "Siehe Commits für Details."
